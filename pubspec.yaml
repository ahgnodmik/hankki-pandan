name: hankki_pandan
description: "한끼한판 - 식단 기록·분석 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Router
  go_router: ^17.0.0

  # Image
  image_picker: ^1.1.2

  # HTTP
  http: ^1.2.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.3.5

  # Dotted border / UI
  flutter_dotenv: ^6.0.0

  # Ads
  google_mobile_ads: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.0
  custom_lint: ^0.8.0
  riverpod_lint: ^3.1.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FAF7F2"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/icon/
